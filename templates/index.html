<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JACK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="container">
        <h1>JACK</h1>
        
        <div class="tabs" role="tablist">
            <button class="tab active" role="tab" data-tab="factcheck" aria-selected="true">Fact Check</button>
            <button class="tab" role="tab" data-tab="query" aria-selected="false">Simple Query</button>
        </div>
        
        <div id="factcheck-panel" class="tab-panel" role="tabpanel">
            <form id="verify-form">
                <div class="form-row">
                    <div class="field">
                        <label for="claim">Claim</label>
                        <textarea id="claim" name="claim" placeholder="Enter the claim to fact-check..." required></textarea>
                    </div>
                    <div class="field">
                        <label for="speaker">Speaker</label>
                        <input type="text" id="speaker" name="speaker" placeholder="e.g., Jeff Bezos, Elon Musk" required />
                    </div>
                </div>
                <button type="submit" class="primary">Verify Claim</button>
            </form>
        </div>
        
        <div id="query-panel" class="tab-panel hidden" role="tabpanel">
            <form id="query-form">
                <div class="field">
                    <label for="question">Question</label>
                    <textarea id="question" name="question" placeholder="Ask anything — JACK will search the web and answer with sources..." required></textarea>
                </div>
                <button type="submit" class="primary">Ask Question</button>
            </form>
        </div>
        
        <div id="status" class="status hidden"></div>
        <div id="result" class="result hidden"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
